name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for the release (e.g., v0.1.3). If omitted, version from Cargo.toml will be used.'
        required: false
        default: ''

jobs:
  release:
    name: Release Windows Binary
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Get Version from Cargo.toml
        id: cargo_version
        shell: pwsh
        run: |
          $version = (Get-Content Cargo.toml | Select-String -Pattern '^version\s*=\s*"(.*)"' | ForEach-Object { $_.Matches.Groups[1].Value })
          echo "version=$version" >> $env:GITHUB_OUTPUT
          $tag = if ("${{ github.event.inputs.tag_name }}") { "${{ github.event.inputs.tag_name }}" } else { "v$version" }
          echo "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Build Release
        run: cargo build --release

      - name: Build Installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" ichi.iss

      - name: Upload Binary and Installer to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.cargo_version.outputs.tag }}
          name: Release ${{ steps.cargo_version.outputs.tag }}
          draft: true
          files: |
            target/release/ichi.exe
            Output/IchiSetup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
